<div class="container">

<!-- Page d'accueil -->
<div *ngIf="aspect === 'accueil'" class="accueil">
  <div class="accueil-content">
    <h1>Bienvenue dans notre application !</h1>
    <p>Nous sommes heureux de vous accueillir.</p>
    <button (click)="goToApp()">Accéder à l'application</button>
  </div>
</div>


  <!-- Application avec menu -->
  <div *ngIf="aspect === 'app'" class="app-container">
    <nav class="menu">
      <button (click)="setPage('photo')">📸 Prendre une photo</button>
      <button (click)="setPage('galerie')">🖼️ Galerie</button>
      <button (click)="setPage('jeu')">🎮 Jeu</button>
    </nav>

    <!-- Page sélectionnée -->
    <div *ngIf="page === 'photo'">
      <app-photo-capture></app-photo-capture>
    </div>

    <div *ngIf="page === 'galerie'">
      <h2>Galerie</h2>
      <div class="gallery">
        <div *ngFor="let photo of photosList; trackBy: trackById" class="photo-item">
          <img [src]="photo.PhotoURL" [alt]="photo.PhotoDescription" />
          <p>{{ photo.PhotoDescription }}</p>
          <small>{{ photo.PhotoDate | date: 'medium' }}</small>
        </div>
      </div>
    </div>

    <div *ngIf="page === 'jeu'">
      <h2>Jeu</h2>
      <div *ngIf="page === 'jeu'">
      <app-memory-game></app-memory-game>
      </div>
    </div>
  </div>
</div>
