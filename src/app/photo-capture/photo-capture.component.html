<div class="photo-capture-container">
  <h2>Capturer ou téléverser une photo</h2>

  <!-- Capture depuis webcam -->
  <div class="capture-section">
    <video autoplay playsinline width="300" height="200"></video>
    <button (click)="capturePhoto()">📸 Capturer</button>
  </div>

  <!-- Upload depuis l'appareil -->
  <div class="upload-section">
    <input type="file" accept="image/*" (change)="onPhotoUpload($event)" />
  </div>

  <!-- Preview -->
  <div class="preview" *ngIf="photo">
    <h3>Prévisualisation</h3>
    <img [src]="photo" alt="Photo capturée" width="300" />
  </div>

  <!-- Galerie -->
  <div class="gallery">
    <h3>Galerie</h3>
    <div class="photo-grid">
      <div *ngFor="let p of photosList" class="photo-card">
        <img [src]="p.PhotoURL" [alt]="p.PhotoDescription" width="150" />
        <p>{{ p.PhotoDescription }}</p>
        <small>{{ p.PhotoDate | date:'mediumDate' }}</small>
      </div>
    </div>
  </div>
</div>
